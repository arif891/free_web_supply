<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Wipe Page Transition - Navigation Animation Demo</title>
        <meta name="description" content="A classic wipe transition effect for page navigation, implemented with CSS animations and speculative rules for performance.">

        <base href="/pages/demo/wipe-page-transition/">

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="page_transition.css">

        <style>
          body {
            background-image: url(/assets/image/demo/common/bg-2.avif);
            background-size: cover;
          }
        </style>

    </head>

    <body>
        <div class="nav">
            <button onclick="goBack()">Back</button>
            <span>LOGO</span>
            <a href="other.html">Other</a>
        </div>

        <h1>Home</h1>

    </body>

    <script type="speculationrules">
  {
    "prerender": [
      {
        "urls": ["./other.html"]
      }
    ]
  }
</script>

    <script>
        function goBack() {
            if (navigation.canGoBack) {
                navigation.back();
            }
        }
    </script>

</html>
