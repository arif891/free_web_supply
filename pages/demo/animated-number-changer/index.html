<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Animated Number Changer - CSS & JS Demo</title>
        <meta name="description" content="A smooth animated number changer component built with HTML, CSS, and JavaScript. Featuring tabular nums and elegant transitions.">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500&display=swap" rel="stylesheet">

        <style>
            body {
                margin: 0;
                font-family: 'Red Hat Display', sans-serif;
                font-weight: 500;
                height: 100svh;
                display: grid;
                place-content: center;
                color: #fff;
                background-image: url(/assets/image/demo/common/bg.avif);
                background-size: cover;
                background-repeat: no-repeat;
                background-position: center;
                -webkit-tap-highlight-color: transparent;
            }

            [data-animate-number] {
                --transition-duration: 1s;

                display: flex;
                align-items: center;
                font-variant-numeric: tabular-nums;
                overflow: clip;
                max-width: 100%;

                .digit,
                .char {
                    display: block;
                    transition-property: width, opacity, translate;
                    transition-duration: calc(var(--transition-duration) * .25), calc(var(--transition-duration) * .15);

                    @starting-style {
                        --num: -1;
                        width: 0ch !important;
                    }

                    &.removing {
                        --num: -1 !important;
                        width: 0ch;
                        opacity: 0;
                    }
                }

                .digit {
                    --num: -1;
                    width: 1ch;
                    height: 1lh;

                    &::before {
                        display: block;
                        content: '0123456789';
                        word-break: break-all;
                        translate: 0 calc(-10% * clamp(-1, var(--num, 0), 9));
                        transition-duration: calc(var(--transition-duration) * .75 * var(--_mp, 1));
                    }

                    &.removing {

                        &::before {
                            transition-duration: calc(var(--transition-duration) * .25);
                        }
                    }
                }

                .char {
                    width: fit-content;
                    interpolate-size: allow-keywords;

                    @starting-style {
                        opacity: 0;
                        translate: 0 100%;
                    }

                    &.removing {
                        translate: 0 100%;
                    }
                }
            }

            #demo {
                --p: 30%;

                font-size: min(12vw, 7.5rem);
                justify-content: center;
                padding-block: .15lh;
                mask-image: linear-gradient(transparent, #000 var(--p) calc(100% - var(--p)), transparent);
            }

            .controls {
                display: flex;
                gap: 8px;
                justify-content: center;
                flex-wrap: wrap;
                padding: 1.5rem 1rem;

                button {
                    font: inherit;
                    padding: 1rem 1.5rem;
                    border-radius: 5rem;
                    border: 0;
                    cursor: pointer;
                    background-color: #8e8e8e46;
                    color: #fff;
                }
            }
        </style>
    </head>

    <body>
        <div>
            <div class="wrapper" id="demo" data-animate-number value="$0.00"></div>
            <div class="controls">
                <button onclick="an.render(demo, randomPrice())">Random price</button>
                <button onclick="an.render(demo,'$1,234,567.89')">Large</button>
                <button onclick="an.render(demo,'$0.00')">Zero</button>
                <button onclick="an.render(demo,'–')">Clear</button>
            </div>
        </div>

        <script>

            class AnimateNumber {
                constructor(selector = '[data-animate-number]') {
                    this.elements = document.querySelectorAll(selector);
                    this.pending = [];
                    this.ms = 1000;
                    this.init();
                }
                init() {
                    this.update();
                }

                update() {
                    this.elements.forEach(ele => {
                        const value = ele.getAttribute('value') || '00';
                        this.render(ele, value);
                    });
                }

                render(ele, value) {
                    this.pending.forEach(clearTimeout);
                    this.pending = [];

                    const duration = parseFloat(getComputedStyle(ele).getPropertyValue('--transition-duration')) * 1000 || this.ms;

                    [...ele.querySelectorAll('.removing')].forEach(el => el.remove());

                    const chars = this._toChars(value);
                    const oldEls = [...ele.children];

                    chars.forEach((char, i) => {
                        const old = oldEls[i];
                        if (!old) {
                            const el = this._makeEl(char);
                            ele.appendChild(el);
                            if (char.type === 'digit') requestAnimationFrame(() => el.style.setProperty('--num', char.value));
                        } else if (old.dataset.type !== char.type) {
                            const el = this._makeEl(char);
                            ele.insertBefore(el, old);
                            if (char.type === 'digit') requestAnimationFrame(() => el.style.setProperty('--num', char.value));
                            old.classList.add('removing');
                            this.pending.push(setTimeout(() => old.remove(), duration));
                        } else {
                            if (char.type === 'digit') old.style.setProperty('--num', char.value);
                            else old.textContent = char.value;
                        }
                    });

                    oldEls.slice(chars.length).forEach(el => {
                        el.classList.add('removing');
                        this.pending.push(setTimeout(() => el.remove(), duration));
                    });

                    ele.dataset.value = value;
                    ele.setAttribute('aria-label', value);
                }

                _toChars(str) {
                    return [...String(str)].map(c => ({ type: /\d/.test(c) ? 'digit' : 'char', value: c }));
                }

                _makeEl({ type, value }) {
                    const el = document.createElement('div');
                    el.className = type;
                    el.dataset.type = type;
                    if (type === 'char') el.textContent = value;
                    return el;
                }
            }

            const an = new AnimateNumber();

            function randomPrice() {
                const dollars = Math.floor(Math.random() * 1e6 + 1);
                const cents = Math.floor(Math.random() * 100).toString().padStart(2, '0');
                return '$' + dollars.toLocaleString('en-US') + '.' + cents;
            }

        </script>
    </body>

</html>
